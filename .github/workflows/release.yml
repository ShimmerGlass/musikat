name: Release

on:
  push:
    tags:
    - 'v*'

env:
  IMAGE: shimmerglass/musikat
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Test
        run: go tool task test

      - name: Build
        run: go tool task build

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "bin/*"

  docker:
    name: Buildx multi-arch image and push
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.ref_name }}
          build-args: |
            # If your Dockerfile uses ARG TARGETOS or TARGETARCH, buildx will
            # populate TARGETOS/TARGETARCH for each platform automatically.
            # We forward the repo version so the image can include it if desired.
            VERSION=${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=inline

      - name: Post-build message
        run: |
          echo "Pushed: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.ref_name }}"
